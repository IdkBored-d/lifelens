name: lifelens
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # ── Existing ───────────────────────────────────────────────────────────────
  provider: ^6.0.5
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.2.0
  health: ^13.3.1
  share_plus: ^12.0.1

  # ── Database ───────────────────────────────────────────────────────────────
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.2

  # ── ONNX Runtime (MobileBERT, DisEmbed, Fitness MLP) ──────────────────────
  onnxruntime: ^1.4.0

  # ── On-device LLM (MiniGen GGUF via llama.cpp) ─────────────────────────────
  llamadart: ^0.6.11
  dio: ^5.0.0

  # ── Networking (Weaviate + Gemini) ─────────────────────────────────────────
  http: ^1.2.1

  # ── BERT Tokenizer (shared by MobileBERT + DisEmbed) ──────────────────────
  dart_wordpiece: ^1.0.0

  # ── Background task scheduling (EOD pipeline) ──────────────────────────────
  background_fetch: ^1.2.3
  flutter_local_notifications: ^17.2.2

  # ── Connectivity (real isOnline checks in pipelines) ────────────────────────
  connectivity_plus: ^6.0.5
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  model_viewer_plus: ^1.7.0
  emoji_picker_flutter: ^4.4.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── ISAR code generation ───────────────────────────────────────────────────
  isar_community_generator: ^3.3.2
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - lib/assets/minime/             # existing
    - assets/models/mobile_bert_emotion.onnx
    - assets/models/disembed_fp16.onnx
  #  - assets/models/fitness_model.onnx
    - assets/models/for MVP/fitness_model_v9.onnx
    - assets/models/vocab.txt
  # ── MiniGen GGUF (bundled fallback — runtime copies to app support dir) ─────
    - assets/models/minigen-Q8_0.gguf
    - assets/models/minigen-f16.gguf
  # ── Old MiniGen ONNX assets (deprecated — replaced by GGUF) ─────────────
  #  - assets/models/minigen_int8.onnx
  #  - assets/models/tokenizer.json
  #  - assets/models/genai_config.json
    - lib/assets/minime/body.glb
    - lib/assets/minime/hair/hair.glb
    - lib/assets/minime/hair/hair_male.glb
    - lib/assets/minime/shirts/neck_tie.glb
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
